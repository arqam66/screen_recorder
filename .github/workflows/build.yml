name: Build Windows .exe

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer + portable exe
        run: npx electron-builder --win --publish never

      - name: List built files
        run: Get-ChildItem dist\*.exe | Select-Object Name, Length

      - name: Create GitHub Release and upload .exe files
        uses: softprops/action-gh-release@v2
        with:
          name: "Screen Recorder Pro ${{ github.ref_name }}"
          body: |
            ## 🎬 Screen Recorder Pro ${{ github.ref_name }}

            ### ⬇️ Download

            | File | What it does |
            |------|-------------|
            | `Screen-Recorder-Pro-Setup-*.exe` | **Installer** — installs with Desktop & Start Menu shortcut, uninstallable |
            | `ScreenRecorderPro-portable.exe` | **Portable** — double-click and run, no install needed |

            ### ✨ Features
            - 🖥️ Screen recording (any Chrome tab or window)
            - 🎬 Screen + Camera face overlay (Loom-style)
            - 🎙️ Voice recording — echo-free
            - ✏️ Laser pointer & pen annotation during recording
            - 📸 Screenshot capture anytime
            - ⏱️ Live timer & audio meter
            - 🎚️ Quality presets (1–8 Mbps)
            - 💾 Saves `.webm` locally — no cloud, no upload, 100% private

            ### 💻 Requirements
            Windows 10 / 11 (64-bit) — no other software needed
          files: dist/*.exe
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
